<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>For Theo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="container">

    <div id="intro" class="screen active">
        <p class="text">
            This is not a song.<br>
            This is how your voice feels.
        </p>
        <button onclick="start()">Start</button>
    </div>

    <div id="touchScreen" class="screen">
        <p class="text" id="touchText">
            Touch the screen
        </p>
    </div>

    <div id="final" class="screen">
        <p class="text">
            Thank you for your voice<br>
            <span class="small">(from someone who truly hears it)</span>
        </p>
    </div>

</div>

<audio id="bgSound" src="ambient.mp3" loop></audio>

<script src="script.js"></script>
</body>
</html>
