<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Theo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container">

  <div id="intro" class="screen active">
    <p class="text">This is not a song.<br>This is how your voice feels.</p>
    <button onclick="start()">Start</button>
  </div>

  <div id="touchScreen" class="screen">
    <p class="text fade" id="touchText">Touch the screen</p>
  </div>

  <div id="final" class="screen">
    <p class="text">
      Thank you for your voice<br>
      <span class="small">(from someone who truly hears it)</span>
    </p>
  </div>

</div>

<script src="particles.js"></script>
<script src="script.js"></script>
<audio id="bgSound" src="ambient.mp3" loop></audio>
</body>
</html>
